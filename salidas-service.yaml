server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://salidas-db-service:5432/salidas_db
    username: postgres
    password: pass
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
