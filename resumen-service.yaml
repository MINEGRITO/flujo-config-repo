server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://resumen-db-service:5432/resumen_db
    username: postgres
    password: pass
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

